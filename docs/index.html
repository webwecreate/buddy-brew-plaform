<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy Brew Member</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #fdf6f3; }
  img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px; }
  h1 { color: #B32324; font-size: 20px; }
  .point { font-size: 32px; font-weight: bold; color: #B32324; }
  .status { color: #666; margin-top: 20px; }
  .claim-success { color: #3B6D11; font-size: 18px; font-weight: bold; }
</style>
</head>
<body>
  <div id="app">
    <p class="status">กำลังโหลด...</p>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = "2010607478-4ZyARdyI";
    const SUPABASE_URL = "https://xsokynhtoxktazlomsnx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_r-BdEYs8q61oSQKv_qJpPw_Xh5BPgRa";

    const app = document.getElementById("app");

    function showProfile(member) {
      app.innerHTML = `
        <img src="${member.picture_url ?? ""}" alt="">
        <h1>สวัสดี ${member.display_name}</h1>
        <p class="point">${member.point} แต้ม</p>
        <p class="status">Tier: ${member.tier}</p>
      `;
    }

    async function main() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const idToken = liff.getIDToken();
      const headers = {
        "Content-Type": "application/json",
        Authorization: "Bearer " + SUPABASE_ANON_KEY,
        apikey: SUPABASE_ANON_KEY,
      };

      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-or-get-member`, {
        method: "POST",
        headers,
        body: JSON.stringify({ idToken }),
      });

      if (!res.ok) {
        app.innerHTML = "<p class='status'>เข้าสู่ระบบไม่สำเร็จ ลองใหม่อีกครั้ง</p>";
        return;
      }

      const { member } = await res.json();

      // ถ้ามาจาก QR สแกน (?token=...) ให้เคลมแต้มอัตโนมัติก่อนโชว์โปรไฟล์
      const token = new URLSearchParams(window.location.search).get("token");
      if (token) {
        app.innerHTML = "<p class='status'>กำลังรับแต้ม...</p>";
        const claimRes = await fetch(`${SUPABASE_URL}/functions/v1/claim-order-token`, {
          method: "POST",
          headers,
          body: JSON.stringify({ token, idToken }),
        });
        const claimData = await claimRes.json();

        if (claimRes.ok) {
          app.innerHTML = `<p class="claim-success">+${claimData.point_awarded} แต้ม!</p><p class="status">รวม ${claimData.new_total} แต้ม</p>`;
          member.point = claimData.new_total;
        } else {
          app.innerHTML = `<p class="status">รับแต้มไม่สำเร็จ: ${claimData.error}</p>`;
        }
        setTimeout(() => showProfile(member), 3000);
        return;
      }

      showProfile(member);
    }

    main().catch((err) => {
      app.innerHTML = "<p class='status'>เกิดข้อผิดพลาด: " + err.message + "</p>";
    });
  </script>
</body>
</html>
